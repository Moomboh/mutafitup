# State of the Art (SOTA) Test Set Baseline Metrics
# This file compiles published performance numbers on the exact test sets used in our pipeline.
# Only exact test-set / metric matches belong here.
#
# The ``reference`` field records the source used for the split-matched number.
# For several GPSite baselines, the exact independent-test MCC values are
# reported in Yuan2024-vp rather than in the original method papers.
#
# Test sets in use:
# - NEW364 (secstr, secstr8)
# - CB513 (rsa)
# - CheZOD117 (disorder)
# - setDeepLoc (subloc; via Schmirler 2024 provenance)
# - GPSite independent test sets (gpsite_*)
#
# Note on Meltome: 
# The literature (e.g., DeepSTABp, ProTstab2) evaluates on FLIP/Meltome splits. 
# Because our pipeline dynamically reconstructs the meltome test set during the
# 'resplit' phase to absorb cross-task test contamination, our test set diverges 
# from the standard FLIP splits. Therefore, direct SOTA comparisons for meltome 
# are excluded here to ensure statistically fair 1:1 comparisons.

tasks:
  secstr:
    test_set: NEW364
    metric: accuracy
    metric_label: Q3
    baselines:
      - name: NetSurfP-2.0
        reference: Klausen2019-kz
        value: 0.843  # NEW364 Q3 accuracy
      - name: NetSurfP-3.0
        reference: Hoie2022-ey
        value: 0.833  # NEW364 Q3 accuracy
      - name: ILMCNet
        reference: Dong2024-hv
        value: 0.8451  # NEW364 Q3 accuracy
      - name: AttSec
        reference: Kim2023-jz
        value: 0.852  # NEW364 Q3 accuracy

  secstr8:
    test_set: NEW364
    metric: accuracy
    metric_label: Q8
    baselines:
      - name: NetSurfP-2.0
        reference: Klausen2019-kz
        value: 0.739  # NEW364 Q8 accuracy
      - name: NetSurfP-3.0
        reference: Hoie2022-ey
        value: 0.729  # NEW364 Q8 accuracy
      - name: ILMCNet
        reference: Dong2024-hv
        value: 0.7417  # NEW364 Q8 accuracy
      - name: AttSec
        reference: Kim2023-jz
        value: 0.755  # NEW364 Q8 accuracy

  rsa:
    test_set: CB513
    metric: pearson  # CB513 RSA is reported as PCC/Pearson in split-matched literature
    metric_label: "Pearson r"
    baselines:
      - name: NetSurfP-2.0
        reference: Klausen2019-kz
        value: 0.791  # 0.791 PCC
      - name: NetSurfP-3.0
        reference: Hoie2022-ey
        value: 0.793  # 0.793 PCC
      - name: PatchProt
        reference: Gogishvili2024-wp
        value: 0.816  # 0.816 PCC

  disorder:
    test_set: CheZOD117
    metric: spearman
    metric_label: "Spearman \u03C1"
    baselines:
      - name: ODiNPred
        reference: Dass2020-ju
        value: 0.67  # CheZOD117 Spearman, rounded from published comparison
      - name: SETH
        reference: Ilzhofer2022-pt
        value: 0.70  # CheZOD117 Spearman

  subloc:
    test_set: setDeepLoc
    metric: accuracy
    metric_label: Accuracy
    baselines:
      - name: Light Attention
        reference: Stark2021-ik
        value: 0.86  # setDeepLoc Q10 accuracy

  gpsite_dna:
