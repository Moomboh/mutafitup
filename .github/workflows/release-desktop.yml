name: Release Desktop Binaries

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

env:
  MUTAFITUP_MODELS_URL: https://huggingface.co/Moomboh/ESMC-300M-mutafitup/resolve/main

jobs:
  build:
    # TODO: remove 'if: false' to enable this workflow once ready
    if: false
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: mutafitup-macos-arm64
            features: desktop
            archive: tar.gz

          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: mutafitup-linux-x86_64
            features: desktop,cuda
            archive: tar.gz

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: mutafitup-windows-x86_64
            features: desktop
            archive: zip

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: app
          key: ${{ matrix.artifact }}

      # Linux: install WebKitGTK and GTK3 for dioxus/desktop
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            libxdo-dev

      - name: Install Dioxus CLI
        uses: cargo-bins/cargo-binstall@main
      - run: cargo binstall dioxus-cli@0.7.1 --no-confirm

      - name: Build desktop app
        run: >-
          dx build
          --platform desktop
          --features ${{ matrix.features }}
          --no-default-features
          --release
        working-directory: app

      - name: Determine build output path
        id: output
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "macOS" ]; then
            echo "path=app/target/dx/mutafitup-app/release/macos" >> "$GITHUB_OUTPUT"
            echo "bundle=MutafitupApp.app" >> "$GITHUB_OUTPUT"
          elif [ "${{ runner.os }}" = "Linux" ]; then
            # On Linux, dx build produces a binary in the target dir
            echo "path=app/target/dx/mutafitup-app/release/linux" >> "$GITHUB_OUTPUT"
            echo "bundle=mutafitup-app" >> "$GITHUB_OUTPUT"
          elif [ "${{ runner.os }}" = "Windows" ]; then
            echo "path=app/target/dx/mutafitup-app/release/windows" >> "$GITHUB_OUTPUT"
            echo "bundle=mutafitup-app.exe" >> "$GITHUB_OUTPUT"
          fi

      - name: Package archive (tar.gz)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME:-dev}"
          dir="${{ matrix.artifact }}-${tag}"
          mkdir -p "$dir"
          cp -r "${{ steps.output.outputs.path }}/${{ steps.output.outputs.bundle }}" "$dir/"
          tar czf "${{ matrix.artifact }}-${tag}.tar.gz" "$dir"
          echo "ARCHIVE=${{ matrix.artifact }}-${tag}.tar.gz" >> "$GITHUB_ENV"

      - name: Package archive (zip)
        if: matrix.archive == 'zip'
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME:-dev}"
          dir="${{ matrix.artifact }}-${tag}"
          mkdir -p "$dir"
          cp -r "${{ steps.output.outputs.path }}/${{ steps.output.outputs.bundle }}" "$dir/"
          7z a "${{ matrix.artifact }}-${tag}.zip" "$dir"
          echo "ARCHIVE=${{ matrix.artifact }}-${tag}.zip" >> "$GITHUB_ENV"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ env.ARCHIVE }}

  release:
    needs: build
    runs-on: ubuntu-latest
    # TODO: remove 'if: false' to enable this workflow once ready
    if: false
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          gh release create "$tag" \
            --repo "$GITHUB_REPOSITORY" \
            --title "mutafitup $tag" \
            --generate-notes \
            artifacts/*
