parameter_counts:
  include_runs:
  - heads_only/esmc_300m_all_heads_only
  - lora/esmc_300m_secstr_r4
  - lora/esmc_300m_secstr_r16
  - accgrad_lora/esmc_300m_all_r4
  - accgrad_lora/esmc_300m_all_r16
  - align_lora/esmc_300m_all_r4
  - align_lora/esmc_300m_all_r16

default_hyperparams: &default_hyperparams
  batch: 8
  lr: 0.0003
  dropout: 0.1
  warmup_ratio: 0.0
  auto_mixed_precision: true
  early_stopping_patience: 5

train:
  validate_every_n_train_batches: 1000
  embedding_cache_dir: .cache/embeddings
  training_checkpoint_dir: .cache/training_checkpoints
  checkpoint_every_n_validations: 10

  heads_only:
  # --- ESM-C 300M heads-only run (all tasks) ---
  - id: esmc_300m_all_heads_only
    <<: *default_hyperparams
    max_validations: 100
    checkpoint: esmc_300m
    color: '#a9a9a9'
    tasks: &all_tasks
    - secstr
    - secstr8
    - disorder
    - rsa
    - meltome
    - subloc
    - gpsite_dna
    - gpsite_rna
    - gpsite_pep
    - gpsite_pro
    - gpsite_atp
    - gpsite_hem
    - gpsite_zn
    - gpsite_ca
    - gpsite_mg
    - gpsite_mn

  lora:
  # --- ESM-C 300M single-task LoRA r4 runs ---
  - id: esmc_300m_secstr_r4
    <<: *default_hyperparams
    max_validations: 40
    checkpoint: esmc_300m
    color: '#4a90d9'
    lora_rank: 4
    lora_alpha: 4
    tasks:
    - secstr

  - id: esmc_300m_secstr8_r4
    <<: *default_hyperparams
    max_validations: 40
    checkpoint: esmc_300m
    color: '#4a90d9'
    lora_rank: 4
    lora_alpha: 4
    tasks:
    - secstr8

  - id: esmc_300m_disorder_r4
    <<: *default_hyperparams
    max_validations: 40
    checkpoint: esmc_300m
    color: '#4a90d9'
    lora_rank: 4
    lora_alpha: 4
    tasks:
    - disorder

  - id: esmc_300m_rsa_r4
    <<: *default_hyperparams
    max_validations: 40
    checkpoint: esmc_300m
    color: '#4a90d9'
    lora_rank: 4
    lora_alpha: 4
    tasks:
    - rsa

  - id: esmc_300m_meltome_r4
    <<: *default_hyperparams
    max_validations: 40
    checkpoint: esmc_300m
    color: '#4a90d9'
    lora_rank: 4
    lora_alpha: 4
    tasks:
    - meltome

  - id: esmc_300m_subloc_r4
    <<: *default_hyperparams
    max_validations: 40
    checkpoint: esmc_300m
    color: '#4a90d9'
    lora_rank: 4
    lora_alpha: 4
