$schema: "https://json-schema.org/draft/2020-12/schema"
title: "Mutafitup Configuration Schema"
description: "Schema for validating mutafitup Snakemake workflow configuration"
type: object

properties:
  datasets:
    type: object
    description: "Configuration for datasets used in the workflow"
    patternProperties:
      "^[a-zA-Z0-9_]+$":
        type: object
        description: "Dataset configuration"
        properties:
          url:
            type: string
            format: uri
            description: "URL to download the dataset from"
          hash:
            type: string
            pattern: "^[a-fA-F0-9]{64}$"
            description: "SHA256 hash of the dataset file for integrity verification"
          commit:
            type: string
            pattern: "^[a-fA-F0-9]{40}$"
            description: "Git commit SHA to pin dataset downloads to"
          base_url:
            type: string
            format: uri
            description: "Base URL for downloading individual dataset files"
          urls:
            type: object
            description: "Mapping of file keys to download URLs"
            patternProperties:
              "^[a-zA-Z0-9_]+$":
                type: string
                format: uri
                description: "Download URL for a specific file"
            additionalProperties: false
          cluster_min_seq_id:
            type: number
            minimum: 0
            maximum: 1
            description: "Minimum sequence identity threshold for MMseqs2 clustering (0-1)"
          valid_cluster_fraction:
            type: number
            minimum: 0
            maximum: 1
            description: "Fraction of clusters to assign to the validation split"
          random_seed:
            type: integer
            minimum: 0
            description: "Random seed for reproducible train/valid splitting"
          hashes:
            type: object
            description: "Per-file SHA256 hashes for integrity verification"
            patternProperties:
              "^.+$":
                type: string
                pattern: "^[a-fA-F0-9]{64}$"
            additionalProperties: false
          subsets:
            type: array
            description: "List of dataset subsets with their properties"
            items:
              type: object
              description: "Dataset subset configuration"
              properties:
                name:
                  type: string
                  pattern: "^[a-z0-9_]+$"
                  description: "Name of the dataset subset (lowercase)"
                type:
                  type: string
                  enum: ["per_protein_regression", "per_protein_classification", "per_residue_regression", "per_residue_classification"]
                  description: "Type of prediction task (level and problem type) for this subset"
                ligand:
                  type: string
                  pattern: "^[A-Z0-9]+$"
                  description: "Ligand abbreviation for binding-site datasets (e.g. DNA, RNA, ATP)"
              required:
                - name
                - type
              additionalProperties: false
            minItems: 1
        required:
          - subsets
        additionalProperties: false
    additionalProperties: false

  data_stats:
    type: object
    description: "Configuration for dataset statistics generation"
    properties:
      histogram_bins:
        type: object
        description: "Number of bins to use for different types of histograms"
        properties:
          seq_length:
            type: integer
            minimum: 1
            maximum: 1000
            description: "Number of bins for sequence length histograms"
          score:
            type: integer
            minimum: 1
            maximum: 1000
            description: "Number of bins for score distribution histograms"
        required:
          - seq_length
          - score
        additionalProperties: false
    required:
      - histogram_bins
    additionalProperties: false

  representation_eval:
    type: object
    description: "Configuration for homolog-based representation evaluation prep"
    properties:
      enabled:
        type: boolean
        description: "Whether to build Swiss-Prot homolog search and annotation outputs"
      swissprot:
        type: object
        properties:
          version:
            type: string
            description: "Pinned Swiss-Prot release label"
          url:
            type: string
            format: uri
            description: "Swiss-Prot FASTA download URL"
          hash:
            type: string
            pattern: "^[a-fA-F0-9]{64}$"
            description: "SHA256 hash of the Swiss-Prot FASTA gzip"
        required:
          - version
          - url
          - hash
        additionalProperties: false
      search:
        type: object
        properties:
          min_seq_id:
            type: number
            minimum: 0
            maximum: 1
          min_query_coverage:
            type: number
            minimum: 0
            maximum: 1
          min_target_coverage:
            type: number
            minimum: 0
            maximum: 1
          gpu:
            type: integer
            minimum: 0
            maximum: 1
        required:
          - min_seq_id
          - min_query_coverage
          - min_target_coverage
        additionalProperties: false
      annotations:
        type: object
        properties:
          batch_size:
            type: integer
            minimum: 1
        required:
          - batch_size
        additionalProperties: false
      embeddings:
        type: object
        properties:
          batch_size:
            type: integer
            minimum: 1
          frozen_checkpoints:
            type: array
            items:
              type: string
            minItems: 1
          include_sections:
            type: array
            items:
              type: string
              enum: ["heads_only", "lora", "accgrad_lora", "align_lora"]
            minItems: 1
        required:
          - batch_size
          - frozen_checkpoints
          - include_sections
        additionalProperties: false
    required:
      - enabled
      - swissprot
      - search
      - annotations
      - embeddings
    additionalProperties: false

  dash_host:
    type: string
    description: "Host to bind the Dash server to (optional, defaults to 127.0.0.1)"
    default: "127.0.0.1"

  dash_port:
    type: integer
    description: "Port to bind the Dash server to (optional, defaults to 8050)"
    minimum: 1
    maximum: 65535
    default: 8050

  subsample:
    type: object
    description: "Configuration for dataset subsampling (optional, typically for dev/testing)"
    properties:
      train_frac:
        type: number
        minimum: 0
        maximum: 1
        description: "Fraction of training data to subsample (optional)"
      valid_frac:
        type: number
        minimum: 0
        maximum: 1
        description: "Fraction of validation data to subsample (optional)"
      test_frac:
        type: number
        minimum: 0
        maximum: 1
        description: "Fraction of test data to subsample (optional)"
      min_rows:
        type: integer
        minimum: 1
        default: 8
        description: "Minimum number of rows to keep after subsampling (prevents empty datasets)"
      random_seed:
        type: integer
        minimum: 0
        description: "Random seed for reproducible subsampling (optional)"
    additionalProperties: false

  resplit:
    type: object
    description: "Configuration for cross-dataset reclustering and resplitting (optional)"
    properties:
      tools:
        type: object
        description: "Per-tool configuration for resplit clustering"
        properties:
          mmseqs:
            type: object
            description: "MMseqs2 sequence identity clustering configuration"
            properties:
              enabled:
                type: boolean
                description: "Whether to run MMseqs2 clustering"
              min_seq_id:
                type: number
                minimum: 0
                maximum: 1
                description: "Minimum sequence identity threshold (0-1)"
              gpu:
                type: integer
                minimum: 0
                maximum: 1
                description: "Use GPU (CUDA) if possible (0=off, 1=on)"
            required:
              - enabled
              - min_seq_id
            additionalProperties: false
          foldseek:
            type: object
            description: "Foldseek ProstT5 structural similarity clustering configuration"
            properties:
              enabled:
                type: boolean
                description: "Whether to run Foldseek clustering"
              min_seq_id:
                type: number
                minimum: 0
                maximum: 1
                description: "Minimum sequence identity threshold (0-1)"
              gpu:
                type: integer
                minimum: 0
                maximum: 1
                description: "Use GPU (CUDA) for ProstT5 createdb and clustering (0=off, 1=on)"
            required:
              - enabled
              - min_seq_id
            additionalProperties: false
        required:
          - mmseqs
          - foldseek
        additionalProperties: false
      min_valid_fraction:
        type: number
        minimum: 0
        maximum: 1
        description: "Minimum fraction of original train+valid to keep as validation per dataset"
      random_seed:
        type: integer
        minimum: 0
        description: "Random seed for deterministic cluster selection in valid top-up"
      datasets:
        type: array
        items:
          type: string
        description: "List of dataset names to include in the resplit pipeline"
      shared_protein_groups:
        type: array
        items:
          type: array
          items:
            type: string
        description: "Groups of datasets that share identical proteins and must receive identical splits"
      reconstruct_test:
        type: object
        description: "Datasets whose test sets are reconstructed from cluster overlap with other datasets"
        properties:
          datasets:
            type: array
            items:
              type: string
            description: "List of dataset names whose test sets should be reconstructed"
          min_test_fraction:
            type: number
            minimum: 0
            maximum: 1
            description: "Minimum fraction of total sequences to include in the reconstructed test set"
        required:
          - datasets
          - min_test_fraction
        additionalProperties: false
      aggregate_duplicates:
        type: object
        description: "Per-dataset duplicate sequence aggregation. Keys are dataset names, values specify the aggregation strategy."
        patternProperties:
          "^[a-z0-9_]+$":
            type: object
            properties:
              strategy:
                type: string
                enum: ["mean"]
                description: "Aggregation strategy for duplicate sequences (currently only 'mean')"
            required:
              - strategy
            additionalProperties: false
        additionalProperties: false
    required:
      - tools
      - datasets
    additionalProperties: false

  train:
    type: object
    description: "Configuration for training (optional)"
    properties:
      validate_every_n_train_batches:
        type: integer
        minimum: 0
        description: "Run validation after this many training batches (0 means once per epoch)"
      embedding_cache_dir:
        type: string
        description: "Directory for caching embeddings when training heads only (no LoRA). Path is relative to project root."
      training_checkpoint_dir:
        type: string
        description: "Directory for saving training checkpoints to resume interrupted training. Path is relative to project root."
      checkpoint_every_n_validations:
        type: integer
        minimum: 1
        description: "Save training checkpoint after this many validations. Default is 1."
      heads_only:
        type: array
        description: "Multitask heads-only training runs"
        items:
          $ref: "#/definitions/train_run_heads_only"
      lora:
        type: array
        description: "Multitask LoRA training runs"
        items:
          $ref: "#/definitions/train_run_lora"
      accgrad_lora:
        type: array
        description: "Multitask LoRA training runs with gradient accumulation across tasks"
        items:
          $ref: "#/definitions/train_run_lora"
      align_lora:
        type: array
        description: "Multitask Align-LoRA training runs (accgrad implied)"
        items:
          $ref: "#/definitions/train_run_align_lora"

  predictions:
    type: object
    description: "Configuration for prediction generation"
    properties:
      variants:
        type: array
        description: "Model variants to predict, each with its own list of splits"
        items:
          type: object
          properties:
            variant:
              type: string
              pattern: "^[a-z_]+$"
              description: "Model variant name (e.g. best_overall, best_task, best_loss_overall)"
            splits:
              type: array
              description: "Data splits to predict on for this variant"
              items:
                type: string
                enum: ["valid", "test"]
              minItems: 1
          required:
            - variant
            - splits
          additionalProperties: false
        minItems: 1
      extra:
        type: object
        description: "Per-run additional variants (key: section/run_id)"
        patternProperties:
          "^.+$":
            type: object
            properties:
              variants:
                type: array
                items:
                  type: string
            additionalProperties: false
        additionalProperties: false
    required:
      - variants
    additionalProperties: false

  onnx_export:
    type: array
    description: "List of trained models to export as ONNX (optional). Each entry references a training run and checkpoint variant."
    items:
      type: object
      properties:
        section:
          type: string
          enum: ["heads_only", "lora", "accgrad_lora", "align_lora"]
          description: "Training section"
        id:
          type: string
          pattern: "^[A-Za-z0-9_]+$"
          description: "Training run ID"
        variant:
          type: string
          enum: ["best_overall", "final"]
          description: "Which model checkpoint variant to export"
        splits:
          type: array
          description: "Data splits to validate the ONNX export on"
          items:
            type: string
            enum: ["valid", "test"]
          minItems: 1
      required:
        - section
        - id
        - variant
        - splits
      additionalProperties: false

  huggingface:
    type: object
    description: "HuggingFace Hub upload configuration (optional). Used by the standalone upload scripts."
    properties:
      repo_id:
        type: string
        pattern: "^[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+$"
        description: "HuggingFace repository ID for models (e.g. 'username/ESMC-300M-mutafitup')"
      datasets_repo_id:
        type: string
        pattern: "^[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+$"
        description: "HuggingFace repository ID for datasets (e.g. 'username/mutafitup-datasets')"
    required:
      - repo_id
    additionalProperties: false

  metrics:
    type: object
    description: "Configuration for evaluation metric computation"
    properties:
      num_bootstraps:
        type: integer
        minimum: 1
        description: "Number of protein-level bootstrap iterations"
      bootstrap_seed:
        type: integer
        minimum: 0
        description: "Random seed for bootstrap sampling"
      per_residue_classification:
        type: array
        description: "Metrics to compute for per-residue classification tasks"
        items:
          type: string
        minItems: 1
      per_residue_regression:
        type: array
        description: "Metrics to compute for per-residue regression tasks"
        items:
          type: string
        minItems: 1
      per_protein_classification:
        type: array
        description: "Metrics to compute for per-protein classification tasks"
        items:
          type: string
        minItems: 1
      per_protein_regression:
        type: array
        description: "Metrics to compute for per-protein regression tasks"
        items:
          type: string
        minItems: 1
    required:
      - num_bootstraps
      - bootstrap_seed
    additionalProperties: false

  evaluations:
    type: array
    description: "Evaluation comparison configurations"
    items:
      $ref: "#/definitions/evaluation_entry"

  auprc_evaluations:
    type: array
    description: "AUPRC evaluation configurations for binary per-residue classification (GPSite) tasks"
    items:
      $ref: "#/definitions/auprc_evaluation_entry"

  parameter_counts:
    type: object
    description: "Configuration for parameter summary and parameter-composition plots"
    properties:
      include_runs:
        type: array
        description: "Optional ordered list of run keys ('section/run_id') to include in the parameter figure. Empty means all configured runs."
        items:
          type: string
          pattern: "^[A-Za-z0-9_]+/[A-Za-z0-9_]+$"
    additionalProperties: false

  leakage_analysis:
    type: object
    description: "Configuration for dataset leakage analysis between task datasets"
    properties:
      profiles:
        type: object
        description: "Named leakage analysis profiles, each with independent datasets and tool settings"
        patternProperties:
          "^[A-Za-z0-9_]+$":
            $ref: "#/definitions/leakage_profile"
        additionalProperties: false
        minProperties: 1
    required:
      - profiles
    additionalProperties: false

  standardized_datasets:
    type: object
    description: "Metadata for standardized datasets living under results/datasets_resplit"
    properties:
      per_protein_regression:
        $ref: "#/definitions/standardized_dataset_group"
      per_protein_classification:
        $ref: "#/definitions/standardized_dataset_group"
      per_residue_regression:
        $ref: "#/definitions/standardized_dataset_group"
      per_residue_classification:
        $ref: "#/definitions/standardized_dataset_group"
    additionalProperties: false

required:
  - datasets
  - data_stats
  - predictions

additionalProperties: true


definitions:
  train_run_base:
    type: object
    description: "Single multitask training run configuration"
    properties:
      id:
        type: string
        pattern: "^[A-Za-z0-9_]+$"
        description: "Identifier for this training run"
      checkpoint:
        type: string
        description: "HuggingFace model checkpoint name"
      color:
        type: string
        pattern: "^#[0-9a-fA-F]{6}$"
        description: "Hex color code for this run in comparison plots"
      batch:
        type: integer
        minimum: 1
        description: "Batch size for this checkpoint"
      max_epochs:
        type: integer
        minimum: 1
        description: "Maximum number of training epochs (optional if max_validations is set)"
      max_validations:
        type: integer
        minimum: 1
        description: "Maximum number of validations (optional if max_epochs is set)"
      lr:
        type: number
        minimum: 0
        description: "Learning rate"
      dropout:
        type: number
        minimum: 0
        maximum: 1
        description: "Dropout probability for multitask heads"
      warmup_ratio:
        type: number
        minimum: 0
        maximum: 1
        description: "Fraction of training steps for learning rate warmup"
      auto_mixed_precision:
        type: boolean
        description: "Whether to use automatic mixed precision (AMP) during training"
      gradient_checkpointing:
        type: boolean
        description: "Whether to enable gradient checkpointing to reduce GPU memory usage at the cost of extra computation"
      lora_rank:
        type: integer
        minimum: 1
        description: "LoRA rank for parameter-efficient fine-tuning"
      lora_alpha:
        type: integer
        minimum: 1
        description: "LoRA alpha scaling parameter"
      align_lora_kl_lambda:
        type: number
        minimum: 0
        description: "Weight for Align-LoRA KL regularization"
      early_stopping_patience:
        type: integer
        minimum: 0
        description: "Number of validations without improvement before stopping. 0 disables early stopping."
      tasks:
        type: array
        description: "Task names to include in this multitask run"
        items:
          oneOf:
            - type: string
              pattern: "^[a-z0-9_]+$"
              description: "Task name (must match a standardized dataset name)"
            - type: object
              description: "Task with additional configuration"
              properties:
                name:
                  type: string
                  pattern: "^[a-z0-9_]+$"
                  description: "Task name (must match a standardized dataset name)"
                head_variant:
                  type: string
                  enum: ["default", "late_pool"]
                  description: "Per-protein head variant. 'late_pool' applies a hidden layer before mean pooling."
              required:
                - name
              additionalProperties: false
        minItems: 1
    required:
      - id
      - checkpoint
      - batch
      - lr
      - dropout
      - warmup_ratio
      - tasks
    additionalProperties: false
  train_run_heads_only:
    allOf:
      - $ref: "#/definitions/train_run_base"
  train_run_lora:
    allOf:
      - $ref: "#/definitions/train_run_base"
      - type: object
        properties:
          lora_rank:
            type: integer
            minimum: 1
            description: "LoRA rank for parameter-efficient fine-tuning"
          lora_alpha:
            type: integer
            minimum: 1
            description: "LoRA alpha scaling parameter"
        required:
          - lora_rank
          - lora_alpha
  train_run_align_lora:
    allOf:
      - $ref: "#/definitions/train_run_lora"
      - type: object
        properties:
          align_lora_kl_lambda:
            type: number
            minimum: 0
            description: "Weight for Align-LoRA KL regularization"
        required:
          - align_lora_kl_lambda
  leakage_profile:
    type: object
    description: "A single leakage analysis profile with its own datasets and tool settings"
    properties:
      datasets:
        type: array
        description: "List of dataset names to include in the leakage analysis"
        items:
          type: string
          pattern: "^[a-z0-9_]+$"
          description: "Dataset name (must match a standardized dataset name)"
        minItems: 2
      tools:
        type: object
        description: "Per-tool configuration for leakage analysis search methods"
        properties:
          mmseqs:
            type: object
            description: "MMseqs2 sequence identity search configuration"
            properties:
              enabled:
                type: boolean
                description: "Whether to run MMseqs2 searches"
              min_seq_id:
                type: number
                minimum: 0
                maximum: 1
                description: "Minimum sequence identity threshold (0-1)"
              gpu:
                type: integer
                minimum: 0
                maximum: 1
                description: "Use GPU (CUDA) if possible (0=off, 1=on)"
            required:
              - enabled
              - min_seq_id
            additionalProperties: false
          foldseek:
            type: object
            description: "Foldseek ProstT5 structural similarity search configuration"
            properties:
              enabled:
                type: boolean
                description: "Whether to run Foldseek searches"
              min_seq_id:
                type: number
                minimum: 0
                maximum: 1
                description: "Minimum sequence identity threshold (0-1)"
              gpu:
                type: integer
                minimum: 0
                maximum: 1
                description: "Use GPU (CUDA) for ProstT5 createdb and search (0=off, 1=on)"
            required:
              - enabled
              - min_seq_id
            additionalProperties: false
        required:
          - mmseqs
          - foldseek
        additionalProperties: false
    required:
      - datasets
      - tools
    additionalProperties: false
  standardized_dataset_group:
    type: object
    description: "Mapping from standardized dataset name to its metadata"
    patternProperties:
      "^[a-z0-9_]+$":
        type: object
        properties:
          color:
            type: string
            pattern: "^#[0-9a-fA-F]{6}$"
            description: "Hex color code for visualizations"
          num_labels:
            type: integer
            minimum: 1
            description: "Number of output labels for classification datasets"
          primary_metric:
            type: string
            description: "Primary metric for best-model tracking and evaluation (e.g. accuracy, spearman)"
          early_stopping_metric:
            type: string
            description: "Optional override metric for early stopping (defaults to primary_metric)"
        required:
          - color
          - primary_metric
        additionalProperties: false
    additionalProperties: false
  run_ref:
    type: object
    description: "Reference to a training run"
    properties:
      section:
        type: string
        enum: ["heads_only", "lora", "accgrad_lora", "align_lora"]
        description: "Training section"
      id:
        type: string
        pattern: "^[A-Za-z0-9_]+$"
        description: "Training run ID"
    required:
      - section
      - id
    additionalProperties: false
  evaluation_run_spec:
    description: "Either a single run for all tasks or per-task run mapping"
    oneOf:
      - type: object
        properties:
          run:
            $ref: "#/definitions/run_ref"
          label:
            type: string
          variant:
            type: string
            description: "Optional variant override for this approach (overrides evaluation-level variant)"
          delta_summary:
            type: boolean
            description: "Set to false to exclude this approach from delta summary plots"
        required:
          - run
        additionalProperties: false
      - type: object
        properties:
          runs:
            type: object
            patternProperties:
              "^[a-z0-9_]+$":
                $ref: "#/definitions/run_ref"
            additionalProperties: false
          label:
            type: string
          variant:
            type: string
            description: "Optional variant override for this approach (overrides evaluation-level variant)"
          delta_summary:
            type: boolean
            description: "Set to false to exclude this approach from delta summary plots"
        required:
          - runs
        additionalProperties: false
  evaluation_entry:
    type: object
    description: "A single evaluation comparison configuration"
    properties:
      id:
        type: string
        pattern: "^[A-Za-z0-9_]+$"
        description: "Unique evaluation identifier"
      title:
        type: string
        description: "Human-readable title for figure headings (defaults to id if absent)"
      split:
        type: string
        enum: ["valid", "test"]
        description: "Data split for evaluation"
      variant:
        type: string
        description: "Model variant for evaluation (e.g. best_overall)"
      datasets:
        type: array
        description: "Tasks and metrics to evaluate"
        items:
          type: object
          properties:
            task:
              type: string
              pattern: "^[a-z0-9_]+$"
              description: "Task/dataset name"
            metric:
              type: string
              description: "Metric to use for this task in the evaluation"
            metric_label:
              type: string
              description: "Human-readable label for the metric (e.g. Q3, AUPRC), shown in baseline row of heatmaps"
          required:
            - task
            - metric
          additionalProperties: false
        minItems: 1
      baseline:
        $ref: "#/definitions/evaluation_run_spec"
      approaches:
        type: array
        description: "Approach run configurations to compare against baseline"
        items:
          $ref: "#/definitions/evaluation_run_spec"
        minItems: 1
    required:
      - id
      - split
      - variant
      - datasets
      - baseline
      - approaches
    additionalProperties: false
  auprc_evaluation_entry:
    type: object
    description: "An AUPRC evaluation for binary per-residue classification tasks"
    properties:
      id:
        type: string
        pattern: "^[A-Za-z0-9_]+$"
        description: "Unique AUPRC evaluation identifier"
      split:
        type: string
        enum: ["valid", "test"]
        description: "Data split for evaluation"
      variant:
        type: string
        description: "Model variant for evaluation (e.g. best_overall, best_task)"
      tasks:
        type: array
        description: "Binary per-residue classification task names (GPSite tasks)"
        items:
          type: string
          pattern: "^[a-z0-9_]+$"
        minItems: 1
      baseline:
