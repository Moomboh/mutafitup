name: mutafitup
channels:
  - conda-forge
  - bioconda
  - pytorch
dependencies:
  - python=3.12
  # -- snakemake & tooling --
  - snakemake>=9.16.0
  - snakemake-executor-plugin-slurm>=2.1.0
  - conda-lock
  - make>=4.4.0
  - conda-build
  # -- project deps (for evaluation rules that run in base env) --
  - pytorch>=2.10.0
  - transformers>=4.48.1,<4.48.2
  - peft>=0.18.1
  - numpy>=2.4.2
  - scipy>=1.17.1
  - scikit-learn>=1.8.0
  - evaluate>=0.4.6
  - sentencepiece>=0.2.1
  - matplotlib>=3.10.8
  - torchmetrics>=1.8.2
  # -- extra workflow deps --
  - pooch>=1.8.0
  - pandas>=2.2.3
  - pyarrow>=22.0.0
  - plotly>=6.3.0
  - dash>=3.2.0
  - rich>=14.0.0
  # -- dev tools --
  - ruff>=0.14.3
  - pyrefly>=0.44.2
  - pytest-cov>=7.0.0
  - pytest-xdist>=3.8.0
  - pip
